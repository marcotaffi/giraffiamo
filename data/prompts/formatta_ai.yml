name: formatta_ai
description: "Formatta l'articolo centrale per sito Apg23"
prompt: >
    Riscrivi il testo markdown fornito per formattarlo in blocchi HTML secondo le seguenti specifiche.

    ═══════════════════════════════════════
    DEFINIZIONE DEI BLOCCHI
    ═══════════════════════════════════════

    - Il numero totale di blocchi nell'output è ESATTAMENTE: 1 (blocco introduttivo) + numero di titoli ## presenti nel testo.
    - NON creare mai un blocco per ogni paragrafo.
    - NON creare blocchi aggiuntivi per nessun altro motivo.
    - Tutti i paragrafi che appartengono alla stessa sezione ## vanno nello stesso blocco, senza eccezioni.
    - Prima del primo ##, tutto il testo confluisce in un unico blocco introduttivo (senza titolo).


    ═══════════════════════════════════════
    ORGANIZZAZIONE DEL TESTO
    ═══════════════════════════════════════

    - Il primo blocco (testo prima del primo ##) non ha titolo: ometti completamente il <div class="PageTitleSmall">.
    - Ogni titolo ## dell'articolo genera esattamente un nuovo blocco titolato.
    - Ogni blocco contiene TUTTI i paragrafi della sua sezione, separati da <p>&#8203;</p>.
    - Inserisci al termine il link alla fonte URL dell'articolo originale, se noto, come spiegato a seguire.

    ═══════════════════════════════════════
    NOTE TECNICHE
    ═══════════════════════════════════════

    - Non modificare il contenuto.
    - Non inventare titoli.
    - Non riassumere.
    - Non aggiungere parole.
    - Non inventare sezioni.
    - Non cambiare l'ordine.
    - Non riformulare.
    - Limita al massimo la creatività: applica solo trasformazioni meccaniche.

    ═══════════════════════════════════════
    REGOLE DI FORMATTAZIONE DEL TESTO
    ═══════════════════════════════════════

    - Nel primo blocco, ometti completamente il <div class="PageTitleSmall">.
    - Ogni titolo di livello 3 → <H3></H3>
    - Ogni paragrafo → <p>Testo</p> nello stesso blocco
    - Separa i paragrafi con separatore <p>&#8203;</p>
    - Frasi e parole in grassetto → <strong>frase o parola</strong>
    - Nomi e cognomi di persona → <strong>Nome Cognome</strong>
    - Frasi e parole in corsivo → <em>frase o parola</em>
    - Nomi di associazioni/enti → <em>Nome</em>
    - Eventi o progetti → <em>&quot;Nome&quot;</em>
    - Citazioni → &laquo;testo&raquo;
    - Elenchi puntati → <ul><li>…</li></ul>
    - Elenchi numerati → <ol><li>…</li></ol>
    - Link esterni → <a target="_blank" href="URL">testo</a>


    ═══════════════════════════════════════
    FORMATO BLOCCHI
    ═══════════════════════════════════════

    Ogni blocco va formattato così:

    <div class="BlockWrapperContainer  Block-titolo-paragrafo-pulsante" style="background-color:#FFFFFF; margin-top:; margin-bottom:2%; height:">
      <div class="BlockMainContainer SiteWidth">
        <div class="BlockWrapper BlockTitoloParagrafoPulsante SiteWidth">
          <div class="BodyText">
             <div class="PageTitleSmall">
                EVENTUALE TITOLO
             </div>
             <div class="BodyText">
               <p>
                 TESTO SUDDIVISO IN PARAGRAFI
               </p>
               <p>&#8203;</p>
               <p>
                SECONDO PARAGRAFO
               </p>
             </div>
          </div>
        </div>
      </div>
    </div>


    ═══════════════════════════════════════
    LINK ALLA FONTE ORIGINALE
    ═══════════════════════════════════════

    Se noto URL dell'articolo originale aggiungi sempre, alla fine del contenuto, dentro l'ultimo BodyText, il rimando alla fonte originale, formattato come segue:

      <div class="MainButtonBlockContainer PulsanteLeft">
        <a class="MainButton MainButtonDark" href="LINK_URL_ARTICOLO_ORIGINALE" target="_blank">
          Leggi l'articolo originale su Semprenews
          <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>


    ═══════════════════════════════════════
    OUTPUT
    ═══════════════════════════════════════

    - Restituisci SOLO l'HTML finale, una serie di blocchi.
    - Nessun testo aggiuntivo.
    - Nessuna spiegazione.
    - Verifica finale: il numero di blocchi corrisponde a 1 + numero di ## del testo originale.
    - Controlla di aver inserito link finale alla fonte originale, se nota. 

