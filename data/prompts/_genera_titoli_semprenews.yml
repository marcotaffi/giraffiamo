name: genera_titoli_semprenews
command: Genera il titolo di un articolo per un portale online.
params:
  type:
    - title
    - occhiello
    - sommario
    - SEO_title
    - SEO_description
prompt: >
 Devi generare dei titoli in formato JSON per il portale online semprenews.it, per l'articolo dato, per invogliare alla lettura e aiutare il lettore a comprendere gli elementi chiave. 
   Scrivi i titoli come testo normale, senza formattazioni. Evidenzia eventuali call to action, inviti a eventi o date principali.
 
  Il JSON deve includere:

  titolo → breve, formale, istituzionale, che inviti alla partecipazione.
  sottotitolo → luogo, data o breve sintesi della dichiarazione principale tra virgolette caporali « ».
  SEO_title → titolo ottimizzato per i motori di ricerca, con la parola chiave principale.
  SEO_description → descrizione SEO sintetica e chiara, con la parola chiave principale.


