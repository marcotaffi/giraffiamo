prompt: |
 Presentati brevemente, presenta in maniera umile le tue capacità e competenze, e spiega cosa sai fare. 
 Spiega che puoi inviare email e salvare documenti su Drive e che entro la fine dell'anno dovresti riuscire ad imparare cose come vedere e a generare le foto, pubblicare sui social e sui siti, a fare analisi seo.


